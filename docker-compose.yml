services:
  infimium:
    build: .
    volumes:
      - ${LOCAL_DOCS_PATH:-./docs}:/data/docs:ro
      - ${CODEBASE_PATH:-./code}:/data/code:ro
      - infimium_db:/app/data
    env_file: .env
    environment:
      LOCAL_DOCS_PATH: /data/docs
      CODEBASE_PATH: /data/code
      CHROMADB_HOST: http://chromadb:8000
      INFIMIUM_DATA_DIR: /app/data
      OLLAMA_HOST: http://localhost:11434
    depends_on:
      chromadb:
        condition: service_healthy
    stdin_open: true
    tty: true

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  infimium_db:
  chroma_data:
