services:
  infimium:
    build: .
    volumes:
      - ${LOCAL_DOCS_PATH:-./docs}:/data/docs:ro
      - ${CODEBASE_PATH:-./code}:/data/code:ro
      - infimium_db:/app/data
      - ollama_models:/root/.ollama
    environment:
      LOCAL_DOCS_PATH: /data/docs
      CODEBASE_PATH: /data/code
      INFIMIUM_DATA_DIR: /app/data
      OLLAMA_HOST: http://localhost:11434
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-tinyfish}
      SHELL_ALLOWLIST: ${SHELL_ALLOWLIST:-ls,git,pwd,npm,npx}
    stdin_open: true
    tty: true

volumes:
  infimium_db:
  ollama_models:
